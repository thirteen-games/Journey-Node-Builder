<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journey Node Builder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 24px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { color: #f0a500; margin-bottom: 8px; }
    h2 { color: #f0a500; margin-bottom: 12px; font-size: 1.2em; }
    .subtitle { color: #888; margin-bottom: 24px; font-size: 0.9em; }
    .section {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 0.85em;
      color: #aaa;
      margin-bottom: 4px;
    }
    .field label .hint { color: #666; font-style: italic; }
    input[type="text"], input[type="number"], textarea {
      width: 100%;
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 8px 10px;
      font-size: 0.9em;
      font-family: inherit;
    }
    textarea { resize: vertical; min-height: 60px; }
    input:focus, textarea:focus { outline: none; border-color: #f0a500; }
    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .checkbox-field input { width: auto; }
    .checkbox-field label { color: #aaa; font-size: 0.85em; }

    .frame-container {
      background: #0f1a30;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
    }
    .frame-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .frame-header h3 { color: #70a1ff; font-size: 1em; }
    .frame-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .frame-grid .full-width { grid-column: 1 / -1; }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9em;
      font-family: inherit;
    }
    .btn-add {
      background: #2d5f2d;
      color: #8fdf8f;
      margin-bottom: 16px;
    }
    .btn-add:hover { background: #3a7a3a; }
    .btn-remove {
      background: #5f2d2d;
      color: #df8f8f;
      font-size: 0.8em;
      padding: 4px 10px;
    }
    .btn-remove:hover { background: #7a3a3a; }
    .btn-generate {
      background: #f0a500;
      color: #1a1a2e;
      font-weight: 600;
      font-size: 1em;
      padding: 12px 24px;
      width: 100%;
    }
    .btn-generate:hover { background: #ffb81c; }
    .btn-copy {
      background: #2d4a5f;
      color: #8fbfdf;
      margin-top: 8px;
    }
    .btn-copy:hover { background: #3a5f7a; }

    .output-area {
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 16px;
      white-space: pre-wrap;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.85em;
      line-height: 1.5;
      max-height: 500px;
      overflow-y: auto;
      color: #8fdf8f;
    }
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .duplicate-hint {
      color: #666;
      font-size: 0.75em;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <h1>Journey Node Builder</h1>
  <p class="subtitle">Generate SQL for GameData.JourneyNodes and GameData.Cutscenes</p>

  <!-- Journey Node Section -->
  <div class="section">
    <h2>Journey Node</h2>
    <div class="checkbox-field">
      <input type="checkbox" id="node-active" checked>
      <label for="node-active">Active</label>
    </div>
    <div class="row-2">
      <div class="field">
        <label for="node-location">Location <span class="hint">(e.g. 5)</span></label>
        <input type="number" id="node-location" placeholder="Location ID">
      </div>
      <div class="field">
        <label for="node-order">Order <span class="hint">(position within location)</span></label>
        <input type="number" id="node-order" placeholder="1">
      </div>
    </div>
    <div class="row-2">
      <div class="field">
        <label for="node-scenario">Scenario <span class="hint">(Scenario ID)</span></label>
        <input type="text" id="node-scenario" placeholder="Scenario ID">
      </div>
      <div class="field">
        <label for="node-rewardids">RewardIds <span class="hint">(Reward ID)</span></label>
        <input type="text" id="node-rewardids" placeholder="Reward ID">
      </div>
    </div>

    <h2 style="margin-top: 16px;">Node Data (JSON)</h2>
    <div class="field">
      <label for="node-title">Title <span class="hint">(appears on location screen button)</span></label>
      <input type="text" id="node-title" placeholder="e.g. A Pirate's Life">
    </div>
    <div class="field">
      <label for="node-description">Description</label>
      <input type="text" id="node-description" placeholder="e.g. Win a match to 20 Novas!">
    </div>
    <div class="row-2">
      <div class="field">
        <label for="node-characterasset">CharacterAssetKey</label>
        <input type="text" id="node-characterasset" placeholder="e.g. Journey/Character_Vivi[...]">
      </div>
      <div class="field">
        <label for="node-backgroundasset">BackgroundAssetKey</label>
        <input type="text" id="node-backgroundasset" placeholder="e.g. Journey/Gameboard_Energy_1">
      </div>
    </div>
    <div class="field">
      <label for="node-hint">Hint <span class="hint">(optional, leave blank for empty)</span></label>
      <input type="text" id="node-hint" placeholder="">
    </div>
  </div>

  <!-- Cutscene Metadata Section -->
  <div class="section">
    <h2>Cutscene Metadata</h2>
    <div style="margin-bottom: 16px; padding: 12px; background: #0f1a30; border: 1px dashed #444; border-radius: 6px;">
      <label style="display: block; font-size: 0.85em; color: #aaa; margin-bottom: 4px;">
        Import Cutscene <span class="hint">(paste a CSV row from GameData.Cutscenes, or previously generated SQL output)</span>
      </label>
      <textarea id="cutscene-import" style="width: 100%; background: #0f0f23; border: 1px solid #333; border-radius: 4px; color: #e0e0e0; padding: 8px 10px; font-size: 0.85em; font-family: 'Consolas', 'Monaco', monospace; min-height: 60px; resize: vertical;" placeholder='Paste a CSV row or generated SQL output here'></textarea>
      <div style="display: flex; gap: 8px; margin-top: 8px;">
        <button class="btn-add" style="margin-bottom: 0;" onclick="importCutsceneRow()">Import Cutscene</button>
      </div>
      <div id="cutscene-import-error" style="color: #df8f8f; font-size: 0.8em; margin-top: 6px; display: none;"></div>
    </div>
    <div class="row-2">
      <div class="field">
        <label for="cutscene-id">CutsceneID <span class="hint">(leave blank for new)</span></label>
        <input type="number" id="cutscene-id" placeholder="Existing Cutscene ID">
      </div>
      <div style="display: flex; align-items: flex-end; padding-bottom: 14px;">
        <div class="checkbox-field" style="margin-bottom: 0;">
          <input type="checkbox" id="cutscene-overwrite">
          <label for="cutscene-overwrite">Overwrite Cutscene</label>
        </div>
      </div>
    </div>
    <div class="field">
      <label for="cs-title">Title</label>
      <input type="text" id="cs-title" placeholder="e.g. A Pirate's Life">
    </div>
    <div class="field">
      <label for="cs-skiptext">SkipText <span class="hint">(popup text if level is skippable; leave blank if not skippable)</span></label>
      <textarea id="cs-skiptext" placeholder="e.g. The Pro of the Boom District..."></textarea>
    </div>
    <div class="field">
      <label for="cs-thumbnail">Thumbnail <span class="hint">(small image on location screen button)</span></label>
      <input type="text" id="cs-thumbnail" placeholder="e.g. Journey/Character_DrBoom[Journey_HostCharacter_Boom_Laugh]">
    </div>
    <div class="field">
      <label for="cs-audiobanks">AudioBanks <span class="hint">(comma-separated voice bank names)</span></label>
      <input type="text" id="cs-audiobanks" placeholder="e.g. VO Cutscene DrBoom, VO Cutscene Vivi">
    </div>
    <div class="checkbox-field">
      <input type="checkbox" id="cs-overridemusic" checked>
      <label for="cs-overridemusic">OverrideMusic <span class="hint">(almost always true)</span></label>
    </div>
  </div>

  <!-- Cutscene Frames Section -->
  <div class="section">
    <h2>Cutscene Frames</h2>
    <div style="margin-bottom: 16px; padding: 12px; background: #0f1a30; border: 1px dashed #444; border-radius: 6px;">
      <label style="display: block; font-size: 0.85em; color: #aaa; margin-bottom: 4px;">
        Import Frames JSON <span class="hint">(paste a single frame object or an array of frames)</span>
      </label>
      <textarea id="frames-import" style="width: 100%; background: #0f0f23; border: 1px solid #333; border-radius: 4px; color: #e0e0e0; padding: 8px 10px; font-size: 0.85em; font-family: 'Consolas', 'Monaco', monospace; min-height: 80px; resize: vertical;" placeholder='Paste JSON here, e.g. {"AudioKey":"...","MusicData":{"AssetKey":"..."},...} or [...]'></textarea>
      <div style="display: flex; gap: 8px; margin-top: 8px;">
        <button class="btn-add" style="margin-bottom: 0;" onclick="importFrames(false)">Import (Replace All)</button>
        <button class="btn-add" style="margin-bottom: 0;" onclick="importFrames(true)">Import (Append)</button>
      </div>
      <div id="import-error" style="color: #df8f8f; font-size: 0.8em; margin-top: 6px; display: none;"></div>
    </div>
    <div id="frames-container"></div>
    <button class="btn-add" onclick="addFrame()">+ Add Frame</button>
  </div>

  <!-- Generate -->
  <button class="btn-generate" onclick="generateSQL()">Generate SQL</button>

  <!-- Output -->
  <div class="section" style="margin-top: 20px;">
    <h2>Generated SQL</h2>
    <div id="sql-output" class="output-area">Click "Generate SQL" to see output...</div>
    <button class="btn-copy" onclick="copySQL()">Copy to Clipboard</button>
  </div>

  <script>
    let frameCount = 0;

    function parseCSVRow(row) {
      const fields = [];
      let i = 0;
      while (i < row.length) {
        if (row[i] === '"') {
          // Quoted field
          i++; // skip opening quote
          let field = '';
          while (i < row.length) {
            if (row[i] === '"') {
              if (i + 1 < row.length && row[i + 1] === '"') {
                field += '"';
                i += 2;
              } else {
                i++; // skip closing quote
                break;
              }
            } else {
              field += row[i];
              i++;
            }
          }
          fields.push(field);
          if (i < row.length && row[i] === ',') i++; // skip comma
        } else {
          // Unquoted field
          let end = row.indexOf(',', i);
          if (end === -1) end = row.length;
          fields.push(row.substring(i, end));
          i = end + 1;
        }
      }
      return fields;
    }

    // Extract a SQL string value starting at position i (right after the opening ')
    // Returns { value, end } where end is the position after the closing '
    // Handles both '' (standard SQL) and \' (MySQL-style) apostrophe escaping
    function extractSQLString(sql, i) {
      let result = '';
      while (i < sql.length) {
        if (sql[i] === '\\' && i + 1 < sql.length && sql[i + 1] === "'") {
          result += "'";
          i += 2;
        } else if (sql[i] === "'") {
          if (i + 1 < sql.length && sql[i + 1] === "'") {
            result += "'";
            i += 2;
          } else {
            return { value: result, end: i + 1 };
          }
        } else {
          result += sql[i];
          i++;
        }
      }
      return { value: result, end: i };
    }

    function parseSQLOutput(sql) {
      let cutsceneId = '';
      let framesStr, metadataStr, skippable;

      // Detect UPDATE vs INSERT for Cutscene
      const updateMatch = sql.match(/UPDATE\s+GameData\.Cutscenes/i);
      const insertMatch = sql.match(/INSERT\s+INTO\s+GameData\.Cutscenes/i);

      if (updateMatch) {
        // UPDATE format: SET Frames = '...', Metadata = '...', Skippable = N WHERE ID = N
        const framesIdx = sql.indexOf("Frames = '", updateMatch.index);
        if (framesIdx === -1) throw new Error('Could not find Frames in UPDATE');
        const framesResult = extractSQLString(sql, framesIdx + "Frames = '".length);
        framesStr = framesResult.value;

        const metaIdx = sql.indexOf("Metadata = '", framesResult.end);
        if (metaIdx === -1) throw new Error('Could not find Metadata in UPDATE');
        const metaResult = extractSQLString(sql, metaIdx + "Metadata = '".length);
        metadataStr = metaResult.value;

        const skipMatch = sql.substring(metaResult.end).match(/Skippable\s*=\s*(\d+)/);
        skippable = skipMatch ? parseInt(skipMatch[1]) : 0;

        const whereMatch = sql.substring(metaResult.end).match(/WHERE\s+ID\s*=\s*(\d+)/i);
        if (whereMatch) cutsceneId = whereMatch[1];
      } else if (insertMatch) {
        // INSERT format: VALUES('Frames', 'Metadata', N)
        const valIdx = sql.indexOf("VALUES('", insertMatch.index);
        if (valIdx === -1) throw new Error('Could not find VALUES in Cutscenes INSERT');
        const framesResult = extractSQLString(sql, valIdx + "VALUES('".length);
        framesStr = framesResult.value;

        // Skip ", '" to get to metadata
        const metaQuote = sql.indexOf("'", framesResult.end + 1);
        if (metaQuote === -1) throw new Error('Could not find Metadata in INSERT');
        const metaResult = extractSQLString(sql, metaQuote + 1);
        metadataStr = metaResult.value;

        const skipMatch = sql.substring(metaResult.end).match(/,\s*(\d+)\s*\)/);
        skippable = skipMatch ? parseInt(skipMatch[1]) : 0;
      } else {
        throw new Error('Could not find Cutscene INSERT or UPDATE statement');
      }

      // Parse JourneyNode INSERT for node data
      let nodeData = {};
      let nodeActive = true, nodeLocation = '', nodeOrder = '', nodeScenario = '', nodeRewardIds = '';
      const nodeMatch = sql.match(/INSERT\s+INTO\s+GameData\.JourneyNodes/i);
      if (nodeMatch) {
        const nodeValIdx = sql.indexOf("VALUES(", nodeMatch.index);
        if (nodeValIdx !== -1) {
          let pos = nodeValIdx + "VALUES(".length;
          // Active
          const activeMatch = sql.substring(pos).match(/^(\d+)\s*,/);
          if (activeMatch) {
            nodeActive = activeMatch[1] === '1';
            pos += activeMatch[0].length;
          }
          // Location
          const locMatch = sql.substring(pos).match(/^\s*(\d+|NULL)\s*,/i);
          if (locMatch) {
            nodeLocation = locMatch[1] === 'NULL' ? '' : locMatch[1];
            pos += locMatch[0].length;
          }
          // Order
          const ordMatch = sql.substring(pos).match(/^\s*(\d+|NULL)\s*,/i);
          if (ordMatch) {
            nodeOrder = ordMatch[1] === 'NULL' ? '' : ordMatch[1];
            pos += ordMatch[0].length;
          }
          // Scenario
          const scenMatch = sql.substring(pos).match(/^\s*(\d+|NULL)\s*,/i);
          if (scenMatch) {
            nodeScenario = scenMatch[1] === 'NULL' ? '' : scenMatch[1];
            pos += scenMatch[0].length;
          }
          // RewardIds (SQL string)
          const rewardQuote = sql.indexOf("'", pos);
          if (rewardQuote !== -1) {
            const rewardResult = extractSQLString(sql, rewardQuote + 1);
            nodeRewardIds = rewardResult.value;
            pos = rewardResult.end;
          }
          // Data (SQL string -> JSON)
          const dataQuote = sql.indexOf("'", pos + 1);
          if (dataQuote !== -1) {
            const dataResult = extractSQLString(sql, dataQuote + 1);
            try {
              nodeData = JSON.parse(dataResult.value);
            } catch (e) { /* ignore, keep defaults */ }
          }
        }
      }

      return { cutsceneId, framesStr, metadataStr, skippable, nodeData, nodeActive, nodeLocation, nodeOrder, nodeScenario, nodeRewardIds };
    }

    function populateFormFromImport(cutsceneId, framesArray, metadata, nodeData, nodeActive, nodeLocation, nodeOrder, nodeScenario, nodeRewardIds) {
      // Populate CutsceneID and check overwrite
      if (cutsceneId) {
        document.getElementById('cutscene-id').value = cutsceneId;
        document.getElementById('cutscene-overwrite').checked = true;
      }

      // Populate metadata fields
      document.getElementById('cs-title').value = metadata.Title || '';
      document.getElementById('cs-skiptext').value = metadata.SkipText || '';
      document.getElementById('cs-thumbnail').value = metadata.Thumbnail || '';
      document.getElementById('cs-audiobanks').value = (metadata.AudioBanks || []).join(', ');
      document.getElementById('cs-overridemusic').checked = metadata.OverrideMusic !== false;

      // Populate journey node fields if provided
      if (nodeData && Object.keys(nodeData).length > 0) {
        document.getElementById('node-title').value = nodeData.Title || '';
        document.getElementById('node-description').value = nodeData.Description || '';
        document.getElementById('node-characterasset').value = nodeData.CharacterAssetKey || '';
        document.getElementById('node-backgroundasset').value = nodeData.BackgroundAssetKey || '';
        document.getElementById('node-hint').value = nodeData.Hint || '';
      }
      if (nodeActive !== undefined) document.getElementById('node-active').checked = nodeActive;
      if (nodeLocation) document.getElementById('node-location').value = nodeLocation;
      if (nodeOrder) document.getElementById('node-order').value = nodeOrder;
      if (nodeScenario) document.getElementById('node-scenario').value = nodeScenario;
      if (nodeRewardIds) document.getElementById('node-rewardids').value = nodeRewardIds;

      // Import frames (replace all)
      document.getElementById('frames-container').innerHTML = '';
      frameCount = 0;
      framesArray.forEach(f => {
        addFrame({
          DialogueSpeaker: f.DialogueSpeaker || '',
          CharacterAssetKey: f.CharacterAssetKey || '',
          DialogueText: f.DialogueText || '',
          AudioKey: f.AudioKey || '',
          MusicAssetKey: (f.MusicData && f.MusicData.AssetKey) || '',
          BackgroundAssetKey: f.BackgroundAssetKey || ''
        });
      });
    }

    function importCutsceneRow() {
      const errorEl = document.getElementById('cutscene-import-error');
      errorEl.style.display = 'none';
      const raw = document.getElementById('cutscene-import').value.trim();
      if (!raw) {
        errorEl.textContent = 'Paste a CSV row or SQL output first.';
        errorEl.style.display = 'block';
        return;
      }

      // Auto-detect: SQL starts with --, CSV starts with a number
      const isSQL = raw.startsWith('--') || /^\s*(UPDATE|INSERT)/i.test(raw);

      try {
        if (isSQL) {
          const parsed = parseSQLOutput(raw);

          let framesArray;
          try {
            framesArray = JSON.parse(parsed.framesStr);
            if (!Array.isArray(framesArray)) throw new Error('Frames must be a JSON array');
          } catch (e) {
            throw new Error('Invalid Frames JSON: ' + e.message);
          }

          let metadata;
          try {
            metadata = JSON.parse(parsed.metadataStr);
          } catch (e) {
            throw new Error('Invalid Metadata JSON: ' + e.message);
          }

          populateFormFromImport(parsed.cutsceneId, framesArray, metadata, parsed.nodeData, parsed.nodeActive, parsed.nodeLocation, parsed.nodeOrder, parsed.nodeScenario, parsed.nodeRewardIds);
        } else {
          // CSV format
          const fields = parseCSVRow(raw);
          if (fields.length < 4) throw new Error(`Expected 4 columns (ID, Frames, Metadata, Skippable), got ${fields.length}`);

          const [idStr, framesStr, metadataStr] = fields;

          let framesArray;
          try {
            framesArray = JSON.parse(framesStr);
            if (!Array.isArray(framesArray)) throw new Error('Frames must be a JSON array');
          } catch (e) {
            throw new Error('Invalid Frames JSON: ' + e.message);
          }

          let metadata;
          try {
            metadata = JSON.parse(metadataStr);
          } catch (e) {
            throw new Error('Invalid Metadata JSON: ' + e.message);
          }

          populateFormFromImport(idStr.trim(), framesArray, metadata);
        }

        // Clear the import box on success
        document.getElementById('cutscene-import').value = '';
      } catch (e) {
        errorEl.textContent = 'Import error: ' + e.message;
        errorEl.style.display = 'block';
      }
    }

    function importFrames(append) {
      const errorEl = document.getElementById('import-error');
      errorEl.style.display = 'none';
      const raw = document.getElementById('frames-import').value.trim();
      if (!raw) {
        errorEl.textContent = 'Paste some JSON first.';
        errorEl.style.display = 'block';
        return;
      }

      let parsed;
      try {
        parsed = JSON.parse(raw);
      } catch (e) {
        errorEl.textContent = 'Invalid JSON: ' + e.message;
        errorEl.style.display = 'block';
        return;
      }

      // Normalize to array
      const frameArray = Array.isArray(parsed) ? parsed : [parsed];

      if (!append) {
        // Clear existing frames
        document.getElementById('frames-container').innerHTML = '';
        frameCount = 0;
      }

      frameArray.forEach(f => {
        addFrame({
          DialogueSpeaker: f.DialogueSpeaker || '',
          CharacterAssetKey: f.CharacterAssetKey || '',
          DialogueText: f.DialogueText || '',
          AudioKey: f.AudioKey || '',
          MusicAssetKey: (f.MusicData && f.MusicData.AssetKey) || '',
          BackgroundAssetKey: f.BackgroundAssetKey || ''
        });
      });

      // Clear the import box after success
      document.getElementById('frames-import').value = '';
    }

    function addFrame(prefill) {
      frameCount++;
      const id = frameCount;
      const container = document.getElementById('frames-container');
      const div = document.createElement('div');
      div.className = 'frame-container';
      div.id = `frame-${id}`;
      div.innerHTML = `
        <div class="frame-header">
          <h3>Frame ${id}</h3>
          <button class="btn-remove" onclick="removeFrame(${id})">Remove</button>
        </div>
        <div class="frame-grid">
          <div class="field">
            <label>DialogueSpeaker</label>
            <input type="text" data-frame="${id}" data-key="DialogueSpeaker" placeholder="e.g. Vivi" value="${prefill?.DialogueSpeaker || ''}">
          </div>
          <div class="field">
            <label>CharacterAssetKey</label>
            <input type="text" data-frame="${id}" data-key="CharacterAssetKey" placeholder="e.g. Journey/Character_Vivi[...]" value="${prefill?.CharacterAssetKey || ''}">
            <div class="duplicate-hint">Leave blank to reuse previous frame's value</div>
          </div>
          <div class="field full-width">
            <label>DialogueText</label>
            <textarea data-frame="${id}" data-key="DialogueText" placeholder="e.g. I've got so much energy already!">${prefill?.DialogueText || ''}</textarea>
          </div>
          <div class="field">
            <label>AudioKey <span class="hint">(voiceover)</span></label>
            <input type="text" data-frame="${id}" data-key="AudioKey" placeholder="e.g. event:/VO/Max/Cutscene/Max_Journey_haha_1" value="${prefill?.AudioKey || ''}">
          </div>
          <div class="field">
            <label>MusicData AssetKey</label>
            <input type="text" data-frame="${id}" data-key="MusicAssetKey" placeholder="e.g. Cutscene Music/Energy District Cutscene" value="${prefill?.MusicAssetKey || ''}">
            <div class="duplicate-hint">Leave blank to reuse previous frame's value</div>
          </div>
          <div class="field full-width">
            <label>BackgroundAssetKey</label>
            <input type="text" data-frame="${id}" data-key="BackgroundAssetKey" placeholder="e.g. Journey/Gameboard_Energy_1" value="${prefill?.BackgroundAssetKey || ''}">
            <div class="duplicate-hint">Leave blank to reuse previous frame's value</div>
          </div>
        </div>
      `;
      container.appendChild(div);
      renumberFrames();
    }

    function removeFrame(id) {
      const el = document.getElementById(`frame-${id}`);
      if (el) el.remove();
      renumberFrames();
    }

    function renumberFrames() {
      const frames = document.querySelectorAll('#frames-container .frame-container');
      frames.forEach((frame, index) => {
        frame.querySelector('h3').textContent = `Frame ${index + 1}`;
      });
    }

    function getFrameData() {
      const frameElements = document.querySelectorAll('#frames-container .frame-container');
      const frames = [];
      let lastCharacterAssetKey = '';
      let lastMusicAssetKey = '';
      let lastBackgroundAssetKey = '';

      frameElements.forEach(frameEl => {
        const inputs = frameEl.querySelectorAll('[data-key]');
        const data = {};
        inputs.forEach(input => {
          data[input.dataset.key] = input.value;
        });

        // Carry forward values from previous frame if blank
        if (!data.CharacterAssetKey && lastCharacterAssetKey) {
          data.CharacterAssetKey = lastCharacterAssetKey;
        }
        if (!data.MusicAssetKey && lastMusicAssetKey) {
          data.MusicAssetKey = lastMusicAssetKey;
        }
        if (!data.BackgroundAssetKey && lastBackgroundAssetKey) {
          data.BackgroundAssetKey = lastBackgroundAssetKey;
        }

        lastCharacterAssetKey = data.CharacterAssetKey;
        lastMusicAssetKey = data.MusicAssetKey;
        lastBackgroundAssetKey = data.BackgroundAssetKey;

        frames.push(data);
      });
      return frames;
    }

    function escapeSQL(str) {
      if (str === null || str === undefined) return '';
      return str.replace(/'/g, "''");
    }

    function generateSQL() {
      const frames = getFrameData();

      // Build Frames JSON array
      const framesJson = frames.map(f => {
        const frame = {};
        frame.AudioKey = f.AudioKey || '';
        frame.MusicData = { AssetKey: f.MusicAssetKey || '' };
        frame.DialogueText = f.DialogueText || '';
        frame.DialogueSpeaker = f.DialogueSpeaker || '';
        frame.CharacterAssetKey = f.CharacterAssetKey || '';
        frame.BackgroundAssetKey = f.BackgroundAssetKey || '';
        return frame;
      });

      // Build Metadata JSON
      const audioBanksRaw = document.getElementById('cs-audiobanks').value.trim();
      const audioBanks = audioBanksRaw
        ? audioBanksRaw.split(',').map(s => s.trim()).filter(s => s)
        : [];

      const metadata = {
        Title: document.getElementById('cs-title').value,
        SkipText: document.getElementById('cs-skiptext').value,
        Thumbnail: document.getElementById('cs-thumbnail').value,
        AudioBanks: audioBanks,
        OverrideMusic: document.getElementById('cs-overridemusic').checked
      };

      const framesJsonStr = JSON.stringify(framesJson);
      const metadataJsonStr = JSON.stringify(metadata);

      const skipText = document.getElementById('cs-skiptext').value.trim();
      const skippable = skipText ? 1 : 0;

      // Build Node Data JSON
      const nodeData = {
        Title: document.getElementById('node-title').value,
        Description: document.getElementById('node-description').value,
        CharacterAssetKey: document.getElementById('node-characterasset').value,
        BackgroundAssetKey: document.getElementById('node-backgroundasset').value,
        Hint: document.getElementById('node-hint').value || ''
      };

      const active = document.getElementById('node-active').checked ? 1 : 0;
      const location = document.getElementById('node-location').value;
      const order = document.getElementById('node-order').value;
      const scenario = document.getElementById('node-scenario').value;
      const rewardIds = document.getElementById('node-rewardids').value;

      const nodeDataJson = JSON.stringify(nodeData);

      const cutsceneId = document.getElementById('cutscene-id').value;
      const overwrite = document.getElementById('cutscene-overwrite').checked;

      let sql = '';
      sql += '-- =============================================\n';
      sql += `-- Journey Node: ${nodeData.Title || '(untitled)'}\n`;
      sql += '-- =============================================\n\n';

      if (overwrite && cutsceneId) {
        sql += '-- Cutscene (overwrite)\n';
        sql += `UPDATE GameData.Cutscenes\n`;
        sql += `SET Frames = '${escapeSQL(framesJsonStr)}',\n`;
        sql += `    Metadata = '${escapeSQL(metadataJsonStr)}',\n`;
        sql += `    Skippable = ${skippable}\n`;
        sql += `WHERE ID = ${cutsceneId};\n\n`;

        sql += '-- Journey Node\n';
        sql += `INSERT INTO GameData.JourneyNodes(Active, Location, \`Order\`, Scenario, RewardIds, Data, CutsceneID)\n`;
        sql += `VALUES(${active}, ${location || 'NULL'}, ${order || 'NULL'}, ${scenario || 'NULL'}, '${escapeSQL(rewardIds || '[]')}', '${escapeSQL(nodeDataJson)}', ${cutsceneId});\n`;
      } else {
        sql += '-- Cutscene\n';
        sql += `INSERT INTO GameData.Cutscenes(Frames, Metadata, Skippable)\n`;
        sql += `VALUES('${escapeSQL(framesJsonStr)}', '${escapeSQL(metadataJsonStr)}', ${skippable});\n`;
        sql += 'SET @cutscene_id = LAST_INSERT_ID();\n\n';

        sql += '-- Journey Node\n';
        sql += `INSERT INTO GameData.JourneyNodes(Active, Location, \`Order\`, Scenario, RewardIds, Data, CutsceneID)\n`;
        sql += `VALUES(${active}, ${location || 'NULL'}, ${order || 'NULL'}, ${scenario || 'NULL'}, '${escapeSQL(rewardIds || '[]')}', '${escapeSQL(nodeDataJson)}', @cutscene_id);\n`;
      }

      document.getElementById('sql-output').textContent = sql;
    }

    function copySQL() {
      const text = document.getElementById('sql-output').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.btn-copy');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1500);
      });
    }

    // Start with one frame
    addFrame();
  </script>
</body>
</html>
